name: Bitcopper Strategic Agent v4.1 MAX

on:
  schedule:
    - cron: "*/5 * * * *"   # Cada 5 minutos, 24/7 (máximo GitHub Actions)
  workflow_dispatch:          # Trigger manual para probar

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Estado local backup — Gist es la fuente principal
      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: /tmp/bitcopper_v41_state.json
          key: bitcopper-v41-state-${{ github.run_id }}
          restore-keys: |
            bitcopper-v41-state-

      - name: Run strategic agent
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          TWILIO_ACCOUNT_SID:   ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:    ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO:   ${{ secrets.TWILIO_WHATSAPP_TO }}
          GIST_TOKEN:           ${{ secrets.GIST_TOKEN }}
        run: node strategic-agent.js

      # Guardar estado local siempre, incluso si el agente falla
      - name: Save agent state
        uses: actions/cache@v4
        if: always()
        with:
          path: /tmp/bitcopper_v41_state.json
          key: bitcopper-v41-state-${{ github.run_id }}
